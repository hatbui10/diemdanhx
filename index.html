    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 10px; }
        .o-a { border: 3px solid #3498db; padding: 10px; margin-bottom: 15px; border-radius: 8px; background-color: #fff; }
        .ten-lop-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 10px; border-bottom: 2px solid #3498db; }
        .ten-lop { font-size: 1.2em; font-weight: bold; color: #2c3e50; }
        .si-so { font-size: 0.9em; color: #7f8c8d; font-weight: bold; }
        .noi-dung-lop { display: none; margin-top: 10px; }
        
        .class-meta { background: #eef2f5; padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #dce4ec; }
        .meta-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .meta-row:last-child { margin-bottom: 0; }
        .meta-row b { min-width: 75px; font-size: 0.9em; color: #2c3e50; }
        .meta-row select { padding: 6px; border-radius: 4px; border: 1px solid #bdc3c7; flex: 1; font-size: 0.9em; outline: none; }
        .btn-goi-gv { background: #2980b9; color: white; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 0.85em; white-space: nowrap; }
        .btn-goi-gv.disabled { background: #bdc3c7; pointer-events: none; opacity: 0.5; }

        .hoc-sinh-card { border: 1px solid #ddd; margin-bottom: 10px; padding: 10px; border-radius: 4px; background: #fafafa; transition: background 0.3s; }
        .hoc-sinh-card.xin-nghi { background: #fffde7; border-color: #fbc02d; }
        .hoc-sinh-card.di-hoc-tiep { border-color: #3498db; }
        
        .line { font-size: 0.95em; margin: 4px 0; }
        .ghi-chu-select { width: 100%; padding: 6px; box-sizing: border-box; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; outline: none; background: #fff; font-size: 0.9em; }
        
        .btn-goi { background: #27ae60; color: white; padding: 2px 8px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 0.8em; margin-left: 5px; display: inline-block; }
        .btn-goi.disabled { background: #bdc3c7; pointer-events: none; opacity: 0.5; }
        
        .ds-buoi { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .o-buoi { width: 30px; height: 30px; border: 2px solid #999; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: bold; border-radius: 4px; }
        .o-buoi.active { background-color: #e74c3c; color: white; border-color: #e74c3c; }
        
        .btn-xin-nghi { padding: 5px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #fbc02d; background: white; color: #fbc02d; font-weight: bold; margin-top: 10px; display: inline-block; }
        .btn-xin-nghi.active { background: #fbc02d; color: white; }
        details summary { list-style: none; display: flex; justify-content: space-between; align-items: center; }
        details summary::after { content: "▼"; font-size: 0.8em; }
        details[open] summary::after { content: "▲"; }

        .btn-di-hoc-tiep { padding: 5px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #3498db; background: white; color: #3498db; font-weight: bold; margin-top: 10px; margin-left: 5px; display: inline-block; }
        .btn-di-hoc-tiep.active { background: #3498db; color: white; }
        .btn-chuyen-lop { background:#9b59b6; color:#fff; padding:5px 10px; border-radius:4px; cursor:pointer; display:inline-block; margin-left:5px; margin-top:10px; font-weight:bold; }

        .lop-box.drag-over { border: 3px dashed #9b59b6 !important; transform: scale(1.02); transition: all 0.2s ease; background: #fdfdff !important; }
        .locked { opacity: 0.5; pointer-events: none; cursor: not-allowed !important; }
        
        /* Khu vực danh sách vắng */
        .ds-vang { margin-top: 10px; padding: 8px; background: #fff3f3; border-left: 4px solid #e74c3c; font-size: 0.9em; color: #c0392b; margin-bottom: 15px;}
        .ds-vang-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px dashed #fbdada; padding-bottom: 5px; }
        .btn-copy-vang { background: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8em; cursor: pointer; }
        .btn-copy-vang:active { background: #c0392b; }
        .vang-item { padding: 6px 0; border-bottom: 1px solid #fbdada; display: flex; justify-content: space-between; align-items: center; }
        .vang-item:last-child { border-bottom: none; }
        .txt-vang { color: #e74c3c; font-weight: bold; }
    </style>
</head>

        function toggleNoiDungLop(tenLop, header) {
            let body = header.nextElementSibling;
            let muiTen = header.querySelector('.mui-ten');
            if(body.style.display === 'block') {
                body.style.display = 'none';
                muiTen.innerText = '▼';
                trangThaiMoLop[tenLop] = false;
            } else {
                body.style.display = 'block';
                muiTen.innerText = '▲';
                trangThaiMoLop[tenLop] = true;
            }
        }

        function updateGiaoVien(selectElem) {
            let mk = prompt("Nhập mật khẩu để thay đổi giáo viên:");
            if (mk !== MAT_KHAU_ADMIN) {
                alert("Sai mật khẩu!");
                taiDuLieu();
                return;
            }
            luuCoDinhMeta();
            renderGiaoDien();
        }

        function doiPhong(selectElem) {
            let mk = prompt("Nhập mật khẩu để thay đổi phòng:");
            if (mk !== MAT_KHAU_ADMIN) {
                alert("Sai mật khẩu!");
                taiDuLieu();
                return;
            }
            luuCoDinhMeta();
            renderGiaoDien();
        }

        function luuGhiChu(tenLop, tenHS, value) {
            let lop = duLieuLop.find(l => l.tenLop === tenLop);
            if(lop) {
                let hs = lop.hocSinh.find(h => h.ten === tenHS);
                if(hs) hs.ghiChu = value;
            }
            localStorage.setItem('duLieuLopDynamic', JSON.stringify(duLieuLop));
            
            let lopDiv = document.querySelector(`.lop-box[data-lop="${tenLop}"]`);
            if (lopDiv) updateVang(lopDiv);
        }

        function luuCoDinhMeta() {
            let dataLop = JSON.parse(localStorage.getItem('classMetaData')) || {};
            document.querySelectorAll('.lop-box').forEach(lopDiv => {
                let tenLop = lopDiv.getAttribute('data-lop');
                let selectPhong = lopDiv.querySelector('.select-phong');
                let selectGv = lopDiv.querySelector('.select-gv');
                if(selectPhong && selectGv) {
                    dataLop[tenLop] = { phong: selectPhong.value, gvSdt: selectGv.value };
                }
            });
            localStorage.setItem('classMetaData', JSON.stringify(dataLop));
        }

        function taiDuLieu() {
            let savedLop = localStorage.getItem('duLieuLopDynamic');
            if (savedLop) {
                try {
                    let tamDuLieu = JSON.parse(savedLop);
                    
                    duLieuLop = duLieuLopGoc.map(goc => {
                        let trungData = tamDuLieu.find(t => t.tenLop === goc.tenLop);
                        if (trungData) {
                            trungData.thu = goc.thu;
                            return trungData;
                        }
                        return goc;
                    });
                } catch (e) {
                    duLieuLop = JSON.parse(JSON.stringify(duLieuLopGoc));
                }
            } else {
                duLieuLop = JSON.parse(JSON.stringify(duLieuLopGoc));
            }
            renderGiaoDien(); 
        }

        function toggleBuoi(tenLop, tenHS, buoiNum, el) {
            if(el.classList.contains('locked')) return;
            let lop = duLieuLop.find(l => l.tenLop === tenLop);
            if(!lop) return;
            let hs = lop.hocSinh.find(h => h.ten === tenHS);
            if(!hs) return;

            if((hs.isXinNghi && !hs.isDiHocTiep)) return;

            if(!hs.buoiVangData) hs.buoiVangData = [];
            let index = hs.buoiVangData.findIndex(b => parseInt(b.buoi) === buoiNum);
            
            if(index !== -1) {
                hs.buoiVangData.splice(index, 1);
            } else {
                hs.buoiVangData.push({ buoi: buoiNum, time: Date.now() });
            }

            localStorage.setItem('duLieuLopDynamic', JSON.stringify(duLieuLop));
            renderGiaoDien(); 
        }

        function toggleXinNghi(tenLop, tenHS, el) {
            if (el.classList.contains('locked')) return;
            let lop = duLieuLop.find(l => l.tenLop === tenLop);
            if(!lop) return;
            let hs = lop.hocSinh.find(h => h.ten === tenHS);
            if(!hs) return;

            hs.isXinNghi = !hs.isXinNghi;
            hs.timeXinNghi = hs.isXinNghi ? Date.now() : null;

            localStorage.setItem('duLieuLopDynamic', JSON.stringify(duLieuLop));
            renderGiaoDien();
        }

        function diHocTiep(tenLop, tenHS, el) {
            let lop = duLieuLop.find(l => l.tenLop === tenLop);
            if(!lop) return;
            let hs = lop.hocSinh.find(h => h.ten === tenHS);
            if(!hs) return;

            hs.isDiHocTiep = !hs.isDiHocTiep;

            localStorage.setItem('duLieuLopDynamic', JSON.stringify(duLieuLop));
            renderGiaoDien();
        }

        function updateVang(lopDiv) {
            if (!lopDiv) return;
            let tenLop = lopDiv.getAttribute('data-lop');
            let dsVang = lopDiv.querySelector('.danh-sach-ten-vang');
            let siSoText = lopDiv.querySelector('.si-so');
            if(!dsVang || !siSoText) return;

            let lopData = duLieuLop.find(l => l.tenLop === tenLop);
            if(!lopData) return;

            let tongHocSinhBanDau = lopData.hocSinh.length;
            let soNghiHan = 0;
            let soHocSinhVangMoi = 0;
            let vangList = [];
            const NOW = Date.now();
            
            lopDiv.querySelectorAll('.hoc-sinh-card').forEach(card => {
                let stt = card.getAttribute('data-stt');
                let ten = card.getAttribute('data-ten');
                let sdt = card.getAttribute('data-sdt');
                
                let hs = lopData.hocSinh.find(h => h.ten === ten);
                if(!hs) return;

                let isActiveStudent = !hs.isXinNghi || hs.isDiHocTiep;
                let isXinNghiMoi = false;

                if (hs.isXinNghi && hs.timeXinNghi) {
                    if (NOW - parseInt(hs.timeXinNghi) > THOI_GIAN_KHOA) {
                        let btnXN = card.querySelector('.btn-xin-nghi');
                        if(btnXN) btnXN.classList.add('locked');
                    } else {
                        isXinNghiMoi = true; 
                    }
                }

                let buoiVangMoi = [];
                let tatCaBuoiVang = [];
                
                if(hs.buoiVangData) {
                    hs.buoiVangData.forEach(bData => {
                        tatCaBuoiVang.push(bData.buoi);
                        if (bData.time && (NOW - parseInt(bData.time) <= THOI_GIAN_KHOA)) {
                            buoiVangMoi.push(bData.buoi); 
                        }
                    });
                }

                let txtVang = card.querySelector('.txt-vang');
                if (txtVang) {
                    if (!isActiveStudent) {
                        txtVang.innerHTML = "Đã xin nghỉ";
                    } else if (tatCaBuoiVang.length > 0) {
                        txtVang.innerHTML = `Buổi ${tatCaBuoiVang.sort((a,b)=>a-b).join(', ')}`;
                    } else {
                        txtVang.innerHTML = "Không";
                    }
                }
                
                if (!isActiveStudent) {
                    soNghiHan++; 
                } else if (buoiVangMoi.length > 0) {
                    soHocSinhVangMoi++; 
                }

                if (isXinNghiMoi || (isActiveStudent && buoiVangMoi.length > 0)) {
                    let chuoiGhiChu = hs.ghiChu ? ` (${hs.ghiChu})` : '';
                    vangList.push({ stt, ten: `${hs.ten}${chuoiGhiChu}`, sdt, isXinNghiMoi });
                }
            });
            
            let siSoTongHienTai = tongHocSinhBanDau - soNghiHan; 
            let siSoCoMat = siSoTongHienTai - soHocSinhVangMoi;
            siSoText.innerText = `Sĩ số: ${siSoCoMat}/${siSoTongHienTai}`;
            
            dsVang.innerHTML = vangList.length === 0 ? "Không có ai" : vangList.map(hs => `
                <div class="vang-item">
                    <span>${hs.stt}. ${hs.ten}</span>
                    <a href="tel:${hs.sdt}" class="btn-goi ${hs.isXinNghiMoi ? 'disabled' : ''}">📞 Gọi</a>
                </div>`).join('');
        }

        // Hàm xử lý Copy danh sách vắng ra bộ nhớ tạm
        function copyDanhSachVang(tenLop) {
            let lopData = duLieuLop.find(l => l.tenLop === tenLop);
            if(!lopData) return;

            let textCopy = `DANH SÁCH VẮNG - LỚP ${tenLop.toUpperCase()}\n`;
            let count = 0;
            const NOW = Date.now();

            lopData.hocSinh.forEach((hs, index) => {
                let isActiveStudent = !hs.isXinNghi || hs.isDiHocTiep;
                let isXinNghiMoi = (hs.isXinNghi && hs.timeXinNghi && (NOW - parseInt(hs.timeXinNghi) <= THOI_GIAN_KHOA));
                
                let buoiVangMoi = [];
                if(hs.buoiVangData) {
                    hs.buoiVangData.forEach(bData => {
                        if (bData.time && (NOW - parseInt(bData.time) <= THOI_GIAN_KHOA)) {
                            buoiVangMoi.push(bData.buoi);
                        }
                    });
                }

                // Nếu là học sinh mới xin nghỉ, hoặc học sinh đi học bình thường nhưng tích vắng trong 2h qua
                if (isXinNghiMoi || (isActiveStudent && buoiVangMoi.length > 0)) {
                    count++;
                    let chuoiGhiChu = hs.ghiChu ? ` (${hs.ghiChu})` : '';
                    textCopy += `${count}. ${hs.ten}${chuoiGhiChu}\n`;
                }
            });

            if (count === 0) {
                alert(`Lớp ${tenLop} hiện tại không có ai vắng mới để copy!`);
                return;
            }

            // Thực hiện sao chép bằng Clipboard API
            navigator.clipboard.writeText(textCopy).then(() => {
                alert(`Đã copy danh sách vắng lớp ${tenLop} vào bộ nhớ tạm!`);
            }).catch(err => {
                alert("Lỗi! Không thể sao chép tự động.");
            });
        }

        function chuyenLop(tenLopCu, tenHS) {
            let mk = prompt("Nhập mật khẩu để chuyển lớp:");
            if (mk !== MAT_KHAU_ADMIN) {
                alert("Sai mật khẩu!");
                return;
            }

            let dsLop = [];
            let menu = "===== DANH SÁCH LỚP HỢP LỆ =====\n\n";

            duLieuLop.forEach((lop) => {
                if (lop.tenLop !== tenLopCu) {
                    dsLop.push(lop.tenLop);
                    menu += (dsLop.length) + ". Lớp " + lop.tenLop + "\n";
                }
            });

            if(dsLop.length === 0){
                alert("Không có lớp khác để chuyển!");
                return;
            }

            let chon = prompt(menu);
            if (chon === null || chon === "") return;
            
            let IndexChon = parseInt(chon) - 1;
            if(isNaN(IndexChon) || !dsLop[IndexChon]) {
                alert("Lựa chọn không hợp lệ!");
                return;
            }
            
            let tenLopMoi = dsLop[IndexChon];
            thựcThiChuyenLopDữLiệu(tenLopCu, tenLopMoi, keyHocSinhMoi(tenLopCu, tenHS) ? tenHS : tenHS);
        }

        function thựcThiChuyenLopDữLiệu(tenLopCu, tenLopMoi, tenHS) {
            let lopCuData = duLieuLop.find(l => l.tenLop === tenLopCu);
            let lopMoiData = duLieuLop.find(l => l.tenLop === tenLopMoi);

            if(lopCuData && lopMoiData) {
                let hsIndex = lopCuData.hocSinh.findIndex(hs => hs.ten === tenHS);
                if(hsIndex !== -1) {
                    let hsData = lopCuData.hocSinh.splice(hsIndex, 1)[0];
                    lopMoiData.hocSinh.push(hsData);
                    
                    trangThaiMoLop[tenLopMoi] = true;

                    localStorage.setItem('duLieuLopDynamic', JSON.stringify(duLieuLop));
                    renderGiaoDien();
                    alert(`Đã di chuyển học sinh ${tenHS} sang lớp ${tenLopMoi}!`);
                } else {
                    alert("Không tìm thấy dữ liệu học sinh!");
                }
            }
        }

        function keyHocSinhMoi(lop, ten) { return true; }

        function drag(ev) {
            ev.dataTransfer.setData("text/ten", ev.target.getAttribute('data-ten'));
            ev.dataTransfer.setData("text/lopcu", ev.target.getAttribute('data-lop-goc'));
        }

        function initDragAndDrop() {
            document.querySelectorAll(".noi-dung-lop").forEach(box => {
                let lopBox = box.closest(".lop-box");
                if (!lopBox) return;
                let tenLopMoi = lopBox.getAttribute('data-lop');

                box.ondragover = (ev) => ev.preventDefault();
                box.ondragenter = (ev) => { if (lopBox) lopBox.classList.add('drag-over'); };
                box.ondragleave = (ev) => { if (lopBox) lopBox.classList.remove('drag-over'); };

                box.ondrop = (ev) => {
                    ev.preventDefault();
                    if (lopBox) lopBox.classList.remove('drag-over'); 

                    let tenHS = ev.dataTransfer.getData("text/ten");
                    let tenLopCu = ev.dataTransfer.getData("text/lopcu");
                    
                    if (tenLopMoi && tenLopCu !== tenLopMoi) {
                        thựcThiChuyenLopDữLiệu(tenLopCu, tenLopMoi, tenHS);
                    }
                };
            });
        }

        setInterval(() => {
            document.querySelectorAll('.lop-box').forEach(div => updateVang(div));
        }, 300000);

        window.onload = function() {
            taiDuLieu();        
        };
    </script>
</body>
</html>
