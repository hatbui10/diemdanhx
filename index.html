<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Class Manager Pro</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #0c0d0f; color: #d1d5db; font-family: 'Segoe UI', sans-serif; margin: 30px 3px 0 3px; }
        .main-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid #fbbf24; color: #fbbf24; padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .section { display: none; margin-left: 15px; border-left: 1px solid #334155; padding-left: 15px; }
        .time-btn { background: #1e293b; color: #fff; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; border: 1px solid #475569; }
        .class-btn { background: #0f172a; border: 1px solid #334155; color: #94a3b8; padding: 12px; margin: 5px 0; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        /* STUDENT CARD & TRẠNG THÁI ĐIỂM DANH */
        .student-card { background: rgba(255,255,255,0.03); border: 1px solid #334155; padding: 10px; margin: 8px 0; border-radius: 8px; transition: 0.3s; }
        .is-absent { border: 1px solid #dc2626; background: rgba(220, 38, 38, 0.1); }
        .is-present { border: 1px solid #10b981; background: rgba(16, 185, 129, 0.1); }

        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        button { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        
        /* STYLE CHO NÚT MỚI */
        .btn-yes { background: #10b981; color: white; }
        .btn-no { background: #dc2626; color: white; }
        .btn-call { background: #2563eb; color: white; text-decoration: none; display: inline-block; padding: 6px 10px; border-radius: 4px; font-size: 11px;}
        
        select { width: 100%; margin-top: 8px; padding: 5px; background: #000; color: #fbbf24; border: 1px solid #475569; border-radius: 4px; cursor: pointer; }
        .class-absent-list { margin-top: 10px; padding: 10px; border: 1px dashed #dc2626; color: #f87171; border-radius: 5px; font-size: 0.85em; font-weight: bold; }
        .btn-copy { background: #6366f1; color: white; margin-top: 8px; width: 100%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body onload="loadData()">

<div class="main-btn" onclick="toggle('thu-5')">► THỨ 5</div>
<div id="thu-5" class="section">
    <div class="time-btn" onclick="toggle('t1830_thu-5')">18:30 — PHIÊN HỌC</div>
    <div id="t1830_thu-5" class="section">
        
        <div class="class-btn" onclick="toggle('list-APOLLO_L5_YEN')">APOLLO L5 - Yến <span id="count-APOLLO_L5_YEN" style="color:#fbbf24;">(0/0)</span> ▼</div>
        <div id="list-APOLLO_L5_YEN" class="section" data-id="APOLLO_L5_YEN" data-name="APOLLO L5 - Yến">
            
            <div class="student-card" id="st_APOLLO_L5_YEN_1">
                <div>1. Trần Minh Châu	091 440 2665</div>
                <div class="btn-group">
                    <button class="btn-yes" onclick="setAttendance('st_APOLLO_L5_YEN_1', true)">Có</button>
                    <button class="btn-no" onclick="setAttendance('st_APOLLO_L5_YEN_1', false)">Vắng</button>
                    <a href="tel:0914402665" class="btn-call">📞 Gọi điện</a>
                </div>
                <select class="move-select" onchange="moveStudentDirect('st_APOLLO_L5_YEN_1', this.value)">
                    <option value="">➡️ Chuyển lớp...</option>
                </select>
                <select onchange="updateStudentClassContext('st_APOLLO_L5_YEN_1')">
                    <option value="">-- Ghi chú --</option>
                    <option value="Nghỉ phép">Nghỉ phép</option>
                    <option value="Đi muộn">Đi muộn</option>
                </select>
            </div>

            <div class="student-card" id="st_APOLLO_L5_YEN_2">
                <div>2. Nguyễn Trung Hiếu	033 339 9559</div>
                <div class="btn-group">
                    <button class="btn-yes" onclick="setAttendance('st_APOLLO_L5_YEN_2', true)">Có</button>
                    <button class="btn-no" onclick="setAttendance('st_APOLLO_L5_YEN_2', false)">Vắng</button>
                    <a href="tel:0333399559" class="btn-call">📞 Gọi điện</a>
                </div>
                <select class="move-select" onchange="moveStudentDirect('st_APOLLO_L5_YEN_2', this.value)">
                    <option value="">➡️ Chuyển lớp...</option>
                </select>
                <select onchange="updateStudentClassContext('st_APOLLO_L5_YEN_2')">
                    <option value="">-- Ghi chú --</option>
                    <option value="Nghỉ phép">Nghỉ phép</option>
                    <option value="Đi muộn">Đi muộn</option>
                </select>
            </div>

            <div class="bottom-controls">
                <div class="class-absent-list" id="absent-APOLLO_L5_YEN">Danh sách vắng:<br>Không có</div>
                <button class="btn-copy" onclick="copyAbsentList('APOLLO_L5_YEN')">📋 Copy DS Vắng</button>
            </div>
        </div>

        <div class="class-btn" onclick="toggle('list-APOLLO_L6_NAM')">APOLLO L6 - Nam <span id="count-APOLLO_L6_NAM" style="color:#fbbf24;">(0/0)</span> ▼</div>
        <div id="list-APOLLO_L6_NAM" class="section" data-id="APOLLO_L6_NAM" data-name="APOLLO L6 - Nam">
            
            <div class="student-card" id="st_APOLLO_L6_NAM_1">
                <div>1. Hoàng Văn Đức	097 888 7766</div>
                <div class="btn-group">
                    <button class="btn-yes" onclick="setAttendance('st_APOLLO_L6_NAM_1', true)">Có</button>
                    <button class="btn-no" onclick="setAttendance('st_APOLLO_L6_NAM_1', false)">Vắng</button>
                    <a href="tel:0978887766" class="btn-call">📞 Gọi điện</a>
                </div>
                <select class="move-select" onchange="moveStudentDirect('st_APOLLO_L6_NAM_1', this.value)">
                    <option value="">➡️ Chuyển lớp...</option>
                </select>
                <select onchange="updateStudentClassContext('st_APOLLO_L6_NAM_1')">
                    <option value="">-- Ghi chú --</option>
                    <option value="Nghỉ phép">Nghỉ phép</option>
                    <option value="Đi muộn">Đi muộn</option>
                </select>
            </div>

            <div class="bottom-controls">
                <div class="class-absent-list" id="absent-APOLLO_L6_NAM">Danh sách vắng:<br>Không có</div>
                <button class="btn-copy" onclick="copyAbsentList('APOLLO_L6_NAM')">📋 Copy DS Vắng</button>
            </div>
        </div>

    </div>
</div>

<script>
    function toggle(id) { 
        const el = document.getElementById(id);
        if(el) el.style.display = (el.style.display === 'block') ? 'none' : 'block'; 
    }

    // Tự động tìm tất cả các lớp đang có trên giao diện và nạp vào Dropdown "Chuyển lớp..."
    function populateClassDropdowns() {
        const classes = [];
        document.querySelectorAll('[id^="list-"]').forEach(section => {
            const classId = section.getAttribute('data-id');
            const className = section.getAttribute('data-name') || classId;
            if(classId) {
                classes.push({ id: classId, name: className });
            }
        });

        document.querySelectorAll('.move-select').forEach(select => {
            // Giữ lại option đầu tiên
            select.innerHTML = '<option value="">➡️ Chuyển lớp...</option>';
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.text = c.name;
                select.appendChild(opt);
            });
        });
    }

    // Điểm danh dựa trực tiếp vào vị trí hiện tại của thẻ học sinh
    function setAttendance(sid, isPresent) {
        const card = document.getElementById(sid);
        if (!card) return;

        if (isPresent) {
            card.classList.add('is-present');
            card.classList.remove('is-absent');
        } else {
            card.classList.add('is-absent');
            card.classList.remove('is-present');
        }
        
        const currentClassId = card.parentElement.getAttribute('data-id');
        if(currentClassId) updateClassAbsentList(currentClassId);
    }

    // Hỗ trợ cập nhật danh sách vắng khi thay đổi "Ghi chú"
    function updateStudentClassContext(sid) {
        const card = document.getElementById(sid);
        if (!card) return;
        const currentClassId = card.parentElement.getAttribute('data-id');
        if(currentClassId) updateClassAbsentList(currentClassId);
    }

    function updateClassAbsentList(classId) {
        const container = document.getElementById('list-' + classId);
        if (!container) return;

        const cards = container.querySelectorAll('.student-card');
        const absents = Array.from(container.querySelectorAll('.is-absent'));
        
        const countEl = document.getElementById('count-' + classId);
        if(countEl) countEl.innerText = `(${cards.length - absents.length}/${cards.length})`;

        const absentNames = absents.map(card => {
            const fullText = card.querySelector('div').innerText;
            const name = fullText.includes('. ') ? fullText.split('. ')[1] : fullText;
            const note = card.querySelectorAll('select')[1].value;
            return name + (note ? " [" + note + "]" : "");
        });

        const absentListEl = document.getElementById('absent-' + classId);
        if(absentListEl) {
            absentListEl.innerHTML = "Danh sách vắng:<br>" + (absentNames.length ? absentNames.join('<br>') : "Không có");
        }
        saveData();
    }

    // XỬ LÝ CHUYỂN LỚP CHÍNH XÁC
    function moveStudentDirect(sid, targetClassId) {
        if (!targetClassId) return;
        const card = document.getElementById(sid);
        const targetList = document.getElementById('list-' + targetClassId);
        
        if(card && targetList) {
            const oldClassId = card.parentElement.getAttribute('data-id');
            
            // Chèn thẻ học sinh vào trước phần nút điều khiển góc dưới của lớp mới
            const bottomControls = targetList.querySelector('.bottom-controls');
            if(bottomControls) {
                targetList.insertBefore(card, bottomControls);
            } else {
                targetList.appendChild(card);
            }
            
            // Reset lại trạng thái của thanh chọn lớp về mặc định sau khi chuyển
            card.querySelector('.move-select').value = "";

            // Cập nhật lại số lượng sĩ số và danh sách vắng của cả lớp cũ lẫn lớp mới
            if(oldClassId) updateClassAbsentList(oldClassId);
            updateClassAbsentList(targetClassId);
            
            alert("Đã chuyển lớp thành công!");
        }
    }

    function copyAbsentList(classId) {
        navigator.clipboard.writeText(document.getElementById('absent-' + classId).innerText);
        alert("Đã copy!");
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('.student-card').forEach(card => {
            if(card.parentElement && card.parentElement.getAttribute('data-id')) {
                data[card.id] = { 
                    parent: card.parentElement.id, 
                    isAbsent: card.classList.contains('is-absent'), 
                    isPresent: card.classList.contains('is-present'), 
                    note: card.querySelectorAll('select')[1].value 
                };
            }
        });
        localStorage.setItem('classData', JSON.stringify(data));
    }

    function loadData() {
        populateClassDropdowns(); // Quét danh sách lớp trước

        const saved = localStorage.getItem('classData');
        if (saved) {
            const data = JSON.parse(saved);
            for (let id in data) {
                const card = document.getElementById(id);
                const parentEl = document.getElementById(data[id].parent);
                if (card && parentEl) {
                    const bottomControls = parentEl.querySelector('.bottom-controls');
                    if(bottomControls) {
                        parentEl.insertBefore(card, bottomControls);
                    } else {
                        parentEl.appendChild(card);
                    }
                    
                    if (data[id].isAbsent) card.classList.add('is-absent');
                    if (data[id].isPresent) card.classList.add('is-present');
                    card.querySelectorAll('select')[1].value = data[id].note || "";
                }
            }
        }
        refreshAllLists();
    }

    function refreshAllLists() {
        document.querySelectorAll('[id^="list-"]').forEach(section => {
            const cId = section.getAttribute('data-id');
            if(cId) updateClassAbsentList(cId);
        });
    }
</script>
</body>
</html>
