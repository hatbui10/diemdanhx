
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Attendance - Note Enhancement Mode</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #050508; /* Giao diện tối Ultra Dark */
            color: #00f0ff; /* Chữ màu xanh màu Neon Cyan */
            margin: 0;
            padding: 0 3px; /* Cách hai biên đúng 3px */
            padding-top: 30px; /* Cách mép trên đúng 30px */
            box-sizing: border-box;
        }
        .container {
            background: #0d0e15;
            border: 1px solid #ff007f; /* Viền màu hồng Neon Pink */
            padding: 20px 12px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.25);
            max-width: 500px;
            margin: auto;
        }
        h2 {
            color: #ff007f;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.6);
            text-align: center;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #ff007f;
            text-transform: uppercase;
        }
        .row-flex {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .label-inline {
            font-size: 15px;
            font-weight: bold;
            color: #00f0ff;
            white-space: nowrap;
        }
        /* Style các ô nhập liệu và dropdown */
        select, textarea, input {
            width: 100%;
            background-color: #090a0f;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #ffffff;
            padding: 10px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
            outline: none;
        }
        select:focus, input:focus, textarea:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 5px rgba(0, 240, 255, 0.4);
        }
        #attendance-list {
            max-height: 520px; /* Đã tăng chiều cao để nhìn thấy 13 học sinh */
            overflow-y: auto;
            border: 1px dashed #334155;
            padding: 5px;
            border-radius: 6px;
            background: #090a0f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            padding: 8px 6px;
            border-bottom: 1px solid #1e293b;
            font-size: 14px;
            color: #ffffff;
        }
        
        /* Đổi cấu trúc hiển thị thành dạng khối xếp chồng */
        .student-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .student-name {
            font-weight: 500;
            word-break: break-word;
        }
        .student-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Bộ nút bấm nhỏ gọn */
        .status-btn-group {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .btn-status {
            width: 24px;  
            height: 22px; 
            border: 1px solid #334155;
            background: #0d0e15;
            color: #475569;
            font-weight: bold;
            font-size: 12px; 
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            padding: 0;
            margin: 10px; /* Đã sửa margin lỗi để thẳng hàng với ô ghi chú */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Nút Có phép (✓) - Tô màu nền VÀNG CAM đậm */
        .btn-status.btn-check.active {
            background: #ffb700;
            color: #000000;
            border-color: #ffb700;
            box-shadow: 0 0 8px rgba(255, 183, 0, 0.4);
        }
        
        /* Nút Không phép (X) - Tô màu nền ĐỎ HỒNG đậm */
        .btn-status.btn-cross.active {
            background: #ff0055;
            color: #ffffff;
            border-color: #ff0055;
            box-shadow: 0 0 8px rgba(255, 0, 85, 0.4);
        }

        .note-input {
            padding: 5px 8px;
            font-size: 13px;
            border: 1px solid #1e293b;
            color: #e2e8f0;
            height: 26px;
        }
        .note-input:focus {
            border-color: #ff007f;
            box-shadow: 0 0 4px rgba(255, 0, 127, 0.4);
        }
        .btn-copy {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-sizing: border-box;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
            box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.1);
            text-transform: uppercase;
            margin-top: 10px;
        }
        .btn-copy:active {
            background: rgba(0, 240, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ CYBER ATTENDANCE SYSTEM ⚡</h2>

    <div class="form-group">
        <label>1. Chọn thông tin ca học:</label>
        <select id="classDropdown" onchange="loadClassData()"></select>
    </div>

    <div class="form-group">
        <div class="row-flex">
            <span class="label-inline">Sĩ số:</span>
            <input type="text" id="inputSiso" style="color: #00ff66; font-weight: bold; border-color: #00ff66;" readonly value="0">
        </div>
    </div>

    <div class="form-group">
        <label>3. Trạng thái điểm danh học sinh:</label>
        <div id="attendance-list"></div>
    </div>

    <div class="form-group">
        <label>4. Số học sinh trong danh sách gốc:</label>
        <input type="text" id="totalCount" readonly style="color: #00f0ff; font-weight: bold; border-color: #334155;" value="Tổng số học sinh gốc: 0">
    </div>

    <div class="form-group">
        <label>5. Danh sách học sinh vắng mặt:</label>
        <textarea id="absentOutput" style="height: 240px; border-color: #ffb700; color: #ffb700;" readonly placeholder="Danh sách vắng mặt..."></textarea>
        <button class="btn-copy" type="button" id="copyBtn" onclick="copyToClipboard()">📋 Sao Chép Danh Sách</button>
    </div>
</div>

<script>
    const database = {
        "Mickey L2+3/ Thị Phương ( Thứ 3+ Thứ 5) T2-158 18h30": [
            "Đỗ Bảo Linh",
            "Đào Đức Minh Khôi (Sữa)",
            "Trần Bảo Nam",
            "Trần Hồ Tuệ Nhi MIC",
            "Trần Minh Khoa",
            "Lê An Nhi (Ri)",
            "Phùng Thanh Thảo",
            "Đặng Ngọc Gia Khôi",
            "Đặng Khải An",
            "Đặng Đức Trung",
            "Nguyễn Bảo Anh",
            "Nguyễn Phương Uyên",
            "Ngô Thị Ngọc Diệp",
            "Nguyễn Bảo Hân",
            "Nguyễn Minh Khôi",
            "Phạm Quang Anh ID NQ",
            "Nguyễn Minh Thảo"
        ],
            
        "CAMBRIDGE - L4/Nhung T3-158 18h45": [
            "Trần Hà My (Su)",
            "Nguyễn Kim Ngân",
            "Nguyễn Tấn Nhật Anh",
            "Nguyễn An Bảo Ngọc",
            "Nguyễn Minh Đăng",
            "Tạ Hồng Phúc Nguyên",
            "Hoàng Trần Diên Phúc",
            "Dương Trúc Lâm (Rubi)",
            "Nguyễn Mỹ An",
            "Lê Bảo An",
            "Nguyễn Trúc Anh",
            "Nguyễn Văn Phúc"
        ],
    
        "SUN LS/Mai Ly T3-58 18h45": [
            "Nguyễn Phương Hà",
            "Nguyễn Bảo Trâm",
            "Vũ Hoài An",
            "Nguyễn Hà Chi",
            "Vũ Kim Anh",
            "Nguyễn Nam Phong",
            "Hoàng Trung Kiên",
            "Trịnh Hoàng Long",
            "Phạm Gia Hưng",
            "Trần Ngọc Khánh Linh",
            "Trần Đặng Quốc Bảo",
            "Nguyễn Hà Anh",
            "Nguyễn An Yên",
            "Đỗ Quang Hải",
            "Minh Quân",
            "Minh Hiếu",
            "Minh Nghĩa",
            "Nguyễn Huyền Anh"
        ],
        
        "Donald. T4-123 17h00": [
            "Lê Đại Nghĩa", 
            "Đặng Thúy Quỳnh", 
            "Hoàng Quốc Bảo", 
            "Bùi Tuấn Anh"
        ]
    };

    let studentArray = [];
    let totalOriginalCount = 0;

    window.onload = function() {
        initDropdown();
        loadClassData();
    };

    function initDropdown() {
        const dropdown = document.getElementById('classDropdown');
        dropdown.innerHTML = "";

        Object.keys(database).forEach(className => {
            const option = document.createElement('option');
            option.value = className;
            option.innerText = className;
            dropdown.appendChild(option);
        });
    }

    function loadClassData() {
        const selectClass = document.getElementById('classDropdown').value;
        const currentList = database[selectClass] || [];
        
        totalOriginalCount = currentList.length;
        document.getElementById('totalCount').value = `Tổng số học sinh gốc: ${totalOriginalCount}`;

        studentArray = currentList.map((name, index) => ({
            id: index + 1,
            name: name,
            status: "Đủ",
            note: ""
        }));

        renderAttendanceTable();
    }

    function renderAttendanceTable() {
        const container = document.getElementById('attendance-list');
        container.innerHTML = "";

        if (studentArray.length === 0) {
            container.innerHTML = "<span style='color:#64748b; font-size:13px; display:block; text-align:center; padding:15px;'>Không có dữ liệu...</span>";
            calculateAndOutput();
            return;
        }

        const table = document.createElement('table');
        const tbody = document.createElement('tbody');

        studentArray.forEach((student, index) => {
            const tr = document.createElement('tr');
            const td = document.createElement('td');
            
            const rowWrapper = document.createElement('div');
            rowWrapper.className = 'student-row';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'student-name';
            nameDiv.innerText = `${student.id}. ${student.name}`;

            const controlsDiv = document.createElement('div');
            controlsDiv.className = 'student-controls';

            const btnGroup = document.createElement('div');
            btnGroup.className = 'status-btn-group';

            const btnCheck = document.createElement('button');
            btnCheck.type = 'button';
            btnCheck.className = 'btn-status btn-check';
            btnCheck.innerText = '✓';
            if (student.status === "Có phép") btnCheck.classList.add('active');

            const btnCross = document.createElement('button');
            btnCross.type = 'button';
            btnCross.className = 'btn-status btn-cross';
            btnCross.innerText = 'X';
            if (student.status === "Không phép") btnCross.classList.add('active');

            btnCheck.addEventListener('click', function() {
                if (studentArray[index].status === "Có phép") {
                    studentArray[index].status = "Đủ";
                    btnCheck.classList.remove('active');
                } else {
                    studentArray[index].status = "Có phép";
                    btnCross.classList.remove('active');
                    btnCheck.classList.add('active');
                }
                calculateAndOutput();
            });

            btnCross.addEventListener('click', function() {
                if (studentArray[index].status === "Không phép") {
                    studentArray[index].status = "Đủ";
                    btnCross.classList.remove('active');
                } else {
                    studentArray[index].status = "Không phép";
                    btnCheck.classList.remove('active');
                    btnCross.classList.add('active');
                }
                calculateAndOutput();
            });

            btnGroup.appendChild(btnCheck);
            btnGroup.appendChild(btnCross);

            const inputNote = document.createElement('input');
            inputNote.type = 'text';
            inputNote.className = 'note-input';
            inputNote.placeholder = 'Ghi chú...';
            inputNote.value = student.note;

            inputNote.addEventListener('input', function() {
                studentArray[index].note = this.value.trim();
                calculateAndOutput();
            });

            controlsDiv.appendChild(btnGroup);
            controlsDiv.appendChild(inputNote);

            rowWrapper.appendChild(nameDiv);
            rowWrapper.appendChild(controlsDiv);
            
            td.appendChild(rowWrapper);
            tr.appendChild(td);
            tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        container.appendChild(table);

        calculateAndOutput();
    }

    function calculateAndOutput() {
        const dropdown = document.getElementById('classDropdown');
        const classText = dropdown.value || "";
        const absentOutput = document.getElementById('absentOutput');
        
        let totalAbsent = 0;
        let textListAbsent = "";

        studentArray.forEach(student => {
            let noteStr = student.note ? ` - ${student.note}` : "";

            if (student.status === "Có phép") {
                textListAbsent += `${student.id}. ${student.name} ( ...✓... ${noteStr})\n`;
                totalAbsent++;
            } else if (student.status === "Không phép") {
                textListAbsent += `${student.id}. ${student.name} ( ...X... ${noteStr})\n`;
                totalAbsent++;
            }
        });

        const currentSiso = totalOriginalCount - totalAbsent;
        document.getElementById('inputSiso').value = currentSiso;

        // Định dạng văn bản mới có dòng "Vắng: X" ngay dưới dòng Sĩ số
        let outputText = `${classText}\nSĩ số: ${currentSiso}\nVắng: ${totalAbsent}\n-----------------------\n Danh sách Vắng:\n`;

        if (totalAbsent === 0) {
            absentOutput.value = `${classText}\nSĩ số: ${currentSiso}\nVắng: 0\nLớp đi học đầy đủ 100%, không có bạn nào vắng.`;
        } else {
            absentOutput.value = outputText + textListAbsent;
        }
    }

    function copyToClipboard() {
        const textToCopy = document.getElementById('absentOutput').value;
        const btn = document.getElementById('copyBtn');

        navigator.clipboard.writeText(textToCopy).then(() => {
            btn.innerText = "✓ ĐÃ SAO CHÉP THÀNH CÔNG!";
            btn.style.color = "#00ff66";
            btn.style.borderColor = "#00ff66";

            setTimeout(() => {
                btn.innerText = "📋 Sao Chép Danh Sách";
                btn.style.color = "#00f0ff";
                btn.style.borderColor = "#00f0ff";
            }, 1500);
        }).catch(err => {
            console.error(err);
            alert("Lỗi sao chép!");
        });
    }
</script>

</body>
</html>
