<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Attendance - Note Enhancement Mode</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #050508; /* Giao diện tối Ultra Dark */
            color: #00f0ff; /* Chữ màu xanh màu Neon Cyan */
            margin: 0;
            padding: 0 3px; /* Cách hai biên đúng 3px */
            padding-top: 30px; /* Cách mép trên đúng 30px */
            box-sizing: border-box;
        }
        .container {
            background: #0d0e15;
            border: 1px solid #ff007f; /* Viền màu hồng Neon Pink */
            padding: 20px 12px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.25);
            max-width: 500px;
            margin: auto;
        }
        h2 {
            color: #ff007f;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.6);
            text-align: center;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #ff007f;
            text-transform: uppercase;
        }
        .row-flex {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .label-inline {
            font-size: 15px;
            font-weight: bold;
            color: #00f0ff;
            white-space: nowrap;
        }
        /* Style các ô nhập liệu và dropdown */
        select, textarea, input {
            width: 100%;
            background-color: #090a0f;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #ffffff;
            padding: 10px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
            outline: none;
        }
        select:focus, input:focus, textarea:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 5px rgba(0, 240, 255, 0.4);
        }
        #attendance-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px dashed #334155;
            padding: 5px;
            border-radius: 6px;
            background: #090a0f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            padding: 8px 4px;
            border-bottom: 1px solid #1e293b;
            font-size: 14px;
            color: #ffffff;
            vertical-align: middle;
        }
        td.name-col { text-align: left; word-break: break-word; width: 35%; }
        td.select-col { width: 110px; text-align: right; }
        td.note-col { padding-left: 6px; }
        
        .status-dropdown {
            width: 100%;
            background: #0d0e15;
            color: #ffb700; /* Chữ vàng Gold */
            border: 1px solid #ffb700;
            padding: 6px 4px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .status-dropdown option {
            background: #0d0e15;
            color: #ffffff;
        }
        .note-input {
            padding: 6px 8px;
            font-size: 13px;
            border: 1px solid #1e293b;
            color: #e2e8f0;
        }
        .note-input:focus {
            border-color: #ff007f;
            box-shadow: 0 0 4px rgba(255, 0, 127, 0.4);
        }
        .btn-copy {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-sizing: border-box;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
            box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.1);
            text-transform: uppercase;
            margin-top: 10px;
        }
        .btn-copy:active {
            background: rgba(0, 240, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ CYBER ATTENDANCE SYSTEM ⚡</h2>

    <div class="form-group">
        <label>1. Chọn thông tin ca học:</label>
        <select id="classDropdown" onchange="loadClassData()"></select>
    </div>

    <div class="form-group">
        <div class="row-flex">
            <span class="label-inline">Sĩ số:</span>
            <input type="text" id="inputSiso" style="color: #00ff66; font-weight: bold; border-color: #00ff66;" readonly value="0">
        </div>
    </div>

    <div class="form-group">
        <label>3. Trạng thái điểm danh học sinh:</label>
        <div id="attendance-list"></div>
    </div>

    <div class="form-group">
        <label>4. Số học sinh trong danh sách gốc:</label>
        <input type="text" id="totalCount" readonly style="color: #00f0ff; font-weight: bold; border-color: #334155;" value="Tổng số học sinh gốc: 0">
    </div>

    <div class="form-group">
        <label>5. Danh sách học sinh vắng mặt:</label>
        <textarea id="absentOutput" style="height: 150px; border-color: #ffb700; color: #ffb700;" readonly placeholder="Danh sách vắng mặt..."></textarea>
        <button class="btn-copy" type="button" id="copyBtn" onclick="copyToClipboard()">📋 Sao Chép Danh Sách</button>
    </div>
</div>

<script>
    const database = {
        "Mickey. T2-237 18h45": [
            "Nguyễn Văn A", 
            "Bùi Thị B", 
            "Trần Văn C", 
            "Lê Thị D", 
            "Phạm Minh E"
        ],
        "Sun. T3-237 18h30": [
            "Nguyễn Hoàng Nam", 
            "Trần Thu Thảo", 
            "Vũ Minh Đức"
        ],
        "Slice. T3-58 18h30": [
            "Học Sinh Slice Một",
            "Học Sinh Slice Hai",
            "Học Sinh Slice Ba"
        ],
        "Donald. T4-123 17h00": [
            "Lê Đại Nghĩa", 
            "Đặng Thúy Quỳnh", 
            "Hoàng Quốc Bảo", 
            "Bùi Tuấn Anh"
        ]
    };

    let studentArray = [];
    let totalOriginalCount = 0;

    window.onload = function() {
        initDropdown();
        loadClassData();
    };

    function initDropdown() {
        const dropdown = document.getElementById('classDropdown');
        dropdown.innerHTML = "";

        Object.keys(database).forEach(className => {
            const option = document.createElement('option');
            option.value = className;
            option.innerText = className;
            dropdown.appendChild(option);
        });
    }

    function loadClassData() {
        const selectClass = document.getElementById('classDropdown').value;
        const currentList = database[selectClass] || [];
        
        totalOriginalCount = currentList.length;
        document.getElementById('totalCount').value = `Tổng số học sinh gốc: ${totalOriginalCount}`;

        // Thêm trường note để quản lý chuỗi ghi chú nhập vào
        studentArray = currentList.map((name, index) => ({
            id: index + 1,
            name: name,
            status: "Đủ",
            note: ""
        }));

        renderAttendanceTable();
    }

    function renderAttendanceTable() {
        const container = document.getElementById('attendance-list');
        container.innerHTML = "";

        if (studentArray.length === 0) {
            container.innerHTML = "<span style='color:#64748b; font-size:13px; display:block; text-align:center; padding:15px;'>Không có dữ liệu...</span>";
            calculateAndOutput();
            return;
        }

        const table = document.createElement('table');
        const tbody = document.createElement('tbody');

        studentArray.forEach((student, index) => {
            const tr = document.createElement('tr');

            // Cột 1: STT và Tên
            const tdName = document.createElement('td');
            tdName.className = 'name-col';
            tdName.innerText = `${student.id}. ${student.name}`;

            // Cột 2: Dropdown trạng thái vắng/đủ
            const tdSelect = document.createElement('td');
            tdSelect.className = 'select-col';

            const select = document.createElement('select');
            select.className = 'status-dropdown';
            select.innerHTML = `
                <option value="Đủ">Có mặt (Đủ)</option>
                <option value="Có phép">Vắng có phép</option>
                <option value="Không phép">Vắng k.phép</option>
            `;
            select.value = student.status;

            select.addEventListener('change', function() {
                studentArray[index].status = this.value;
                calculateAndOutput();
            });
            tdSelect.appendChild(select);

            // Cột 3: Ô nhập ghi chú
            const tdNote = document.createElement('td');
            tdNote.className = 'note-col';

            const inputNote = document.createElement('input');
            inputNote.type = 'text';
            inputNote.className = 'note-input';
            inputNote.placeholder = 'Ghi chú...';
            inputNote.value = student.note;

            // Lắng nghe sự kiện gõ chữ ở ô ghi chú để cập nhật tự động lên Ô số 5
            inputNote.addEventListener('input', function() {
                studentArray[index].note = this.value.trim();
                calculateAndOutput();
            });
            tdNote.appendChild(inputNote);

            tr.appendChild(tdName);
            tr.appendChild(tdSelect);
            tr.appendChild(tdNote);
            tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        container.appendChild(table);

        calculateAndOutput();
    }

    function calculateAndOutput() {
        const dropdown = document.getElementById('classDropdown');
        const classText = dropdown.value || "";
        const absentOutput = document.getElementById('absentOutput');
        
        let absentCount = 1;
        let totalAbsent = 0;
        let textListAbsent = "";

        studentArray.forEach(student => {
            // Định dạng chuỗi ghi chú kèm thêm nếu có nội dung viết vào ô note
            let noteStr = student.note ? ` - ${student.note}` : "";

            if (student.status === "Có phép") {
                textListAbsent += `${absentCount}. ${student.name} (Vắng có phép${noteStr})\n`;
                absentCount++;
                totalAbsent++;
            } else if (student.status === "Không phép") {
                textListAbsent += `${absentCount}. ${student.name} (Vắng KHÔNG phép${noteStr})\n`;
                absentCount++;
                totalAbsent++;
            }
        });

        const currentSiso = totalOriginalCount - totalAbsent;
        document.getElementById('inputSiso').value = currentSiso;

        let outputText = `Ca học: ${classText}\nSĩ số: ${currentSiso}\n-----------------------\n`;

        if (totalAbsent === 0) {
            absentOutput.value = `Ca học: ${classText}\nSĩ số: ${currentSiso}\nLớp đi học đầy đủ 100%, không có bạn nào vắng.`;
        } else {
            absentOutput.value = outputText + textListAbsent;
        }
    }

    function copyToClipboard() {
        const textToCopy = document.getElementById('absentOutput').value;
        const btn = document.getElementById('copyBtn');

        navigator.clipboard.writeText(textToCopy).then(() => {
            btn.innerText = "✓ ĐÃ SAO CHÉP THÀNH CÔNG!";
            btn.style.color = "#00ff66";
            btn.style.borderColor = "#00ff66";

            setTimeout(() => {
                btn.innerText = "📋 Sao Chép Danh Sách";
                btn.style.color = "#00f0ff";
                btn.style.borderColor = "#00f0ff";
            }, 1500);
        }).catch(err => {
            console.error(err);
            alert("Lỗi sao chép!");
        });
    }
</script>

</body>
</html>
