<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Class Manager Pro</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #0c0d0f; color: #d1d5db; font-family: 'Segoe UI', sans-serif; margin: 30px 3px 0 3px; }
        .main-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid #fbbf24; color: #fbbf24; padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .section { display: none; margin-left: 15px; border-left: 1px solid #334155; padding-left: 15px; }
        .time-btn { background: #1e293b; color: #fff; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; border: 1px solid #475569; }
        .class-btn { background: #0f172a; border: 1px solid #334155; color: #94a3b8; padding: 12px; margin: 5px 0; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .student-card { background: rgba(255,255,255,0.03); border: 1px solid #334155; padding: 10px; margin: 8px 0; border-radius: 8px; transition: 0.3s; }
        .is-absent { border: 1px solid #dc2626; background: rgba(220, 38, 38, 0.1); }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        button { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-no { background: #dc2626; color: white; }
        .btn-call { background: #2563eb; color: white; text-decoration: none; display: inline-block; padding: 6px 10px; }
        select { width: 100%; margin-top: 8px; padding: 5px; background: #000; color: #fbbf24; border: 1px solid #475569; border-radius: 4px; cursor: pointer; }
        .class-absent-list { margin-top: 10px; padding: 10px; border: 1px dashed #dc2626; color: #f87171; border-radius: 5px; font-size: 0.85em; font-weight: bold; }
        .btn-copy { background: #6366f1; color: white; margin-top: 8px; width: 100%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body onload="loadData()">

    <div class="main-btn" onclick="toggle('day2')">► THỨ 2</div>
    <div id="day2" class="section">
        <div class="time-btn" onclick="toggle('t18')">18:00 — PHIÊN HỌC</div>
        <div id="t18" class="section">
            
            <div class="class-btn" onclick="toggle('list1')">LỚP A1 <span id="count-class1" style="color:#fbbf24;">(0/0)</span> ▼</div>
            <div id="list1" class="section" data-id="class1">
                <div class="student-card" id="st1">
                    <div>1. Nguyễn Văn A</div>
                    <div class="btn-group">
                        <button class="btn-no" onclick="toggleAttendance('st1', 'class1')">Vắng / Có</button>
                        <a href="tel:0901234567" class="btn-call">📞 Gọi</a>
                    </div>
                    <select onchange="moveStudentDirect('st1', this.value)">
                        <option value="">➡️ Chuyển lớp...</option>
                        <option value="class1">Lớp A1</option>
                        <option value="class2">Lớp A2</option>
                    </select>
                    <select onchange="updateClassAbsentList('class1')">
                        <option value="">-- Ghi chú --</option>
                        <option value="Nghỉ phép">Nghỉ phép</option>
                        <option value="Ốm">Ốm</option>
                    </select>
                </div>
                <div class="student-card" id="st2">
                    <div>2. Trần Thị B</div>
                    <div class="btn-group">
                        <button class="btn-no" onclick="toggleAttendance('st2', 'class1')">Vắng / Có</button>
                        <a href="tel:0901234568" class="btn-call">📞 Gọi</a>
                    </div>
                    <select onchange="moveStudentDirect('st2', this.value)">
                        <option value="">➡️ Chuyển lớp...</option>
                        <option value="class1">Lớp A1</option>
                        <option value="class2">Lớp A2</option>
                    </select>
                    <select onchange="updateClassAbsentList('class1')">
                        <option value="">-- Ghi chú --</option>
                        <option value="Nghỉ phép">Nghỉ phép</option>
                        <option value="Ốm">Ốm</option>
                    </select>
                </div>
                <div class="class-absent-list" id="absent-class1">Danh sách vắng: Không có</div>
                <button class="btn-copy" onclick="copyAbsentList('class1')">📋 Copy DS Vắng</button>
            </div>

            <div class="class-btn" onclick="toggle('list2')">LỚP A2 <span id="count-class2" style="color:#fbbf24;">(0/0)</span> ▼</div>
            <div id="list2" class="section" data-id="class2">
                <div class="student-card" id="st3">
                    <div>3. Lê Văn C</div>
                    <div class="btn-group">
                        <button class="btn-no" onclick="toggleAttendance('st3', 'class2')">Vắng / Có</button>
                        <a href="tel:0901234569" class="btn-call">📞 Gọi</a>
                    </div>
                    <select onchange="moveStudentDirect('st3', this.value)">
                        <option value="">➡️ Chuyển lớp...</option>
                        <option value="class1">Lớp A1</option>
                        <option value="class2">Lớp A2</option>
                    </select>
                    <select onchange="updateClassAbsentList('class2')">
                        <option value="">-- Ghi chú --</option>
                        <option value="Nghỉ phép">Nghỉ phép</option>
                        <option value="Ốm">Ốm</option>
                    </select>
                </div>
                <div class="student-card" id="st4">
                    <div>4. Phạm Thị D</div>
                    <div class="btn-group">
                        <button class="btn-no" onclick="toggleAttendance('st4', 'class2')">Vắng / Có</button>
                        <a href="tel:0901234570" class="btn-call">📞 Gọi</a>
                    </div>
                    <select onchange="moveStudentDirect('st4', this.value)">
                        <option value="">➡️ Chuyển lớp...</option>
                        <option value="class1">Lớp A1</option>
                        <option value="class2">Lớp A2</option>
                    </select>
                    <select onchange="updateClassAbsentList('class2')">
                        <option value="">-- Ghi chú --</option>
                        <option value="Nghỉ phép">Nghỉ phép</option>
                        <option value="Ốm">Ốm</option>
                    </select>
                </div>
                <div class="class-absent-list" id="absent-class2">Danh sách vắng: Không có</div>
                <button class="btn-copy" onclick="copyAbsentList('class2')">📋 Copy DS Vắng</button>
            </div>
        </div>
    </div>

    <script>
        function toggle(id) { document.getElementById(id).style.display = (document.getElementById(id).style.display === 'block') ? 'none' : 'block'; }

        function toggleAttendance(sid, classId) {
            document.getElementById(sid).classList.toggle('is-absent');
            updateClassAbsentList(classId);
        }

        function updateClassAbsentList(classId) {
            const container = document.getElementById('list' + classId.replace('class', ''));
            const cards = container.querySelectorAll('.student-card');
            const absents = Array.from(container.querySelectorAll('.is-absent'));
            
            document.getElementById('count-' + classId).innerText = `(${cards.length - absents.length}/${cards.length})`;

            const absentNames = absents.map(card => {
                const name = card.querySelector('div').innerText.split('. ')[1];
                const note = card.querySelectorAll('select')[1].value;
                return name + (note ? " [" + note + "]" : "");
            });
            document.getElementById('absent-' + classId).innerHTML = "Danh sách vắng:<br>" + (absentNames.length ? absentNames.join('<br>') : "Không có");
            saveData();
        }

        function moveStudentDirect(sid, targetClassId) {
            if (!targetClassId) return;
            const card = document.getElementById(sid);
            const targetList = document.getElementById('list' + targetClassId.replace('class', ''));
            targetList.appendChild(card);
            updateClassAbsentList(targetClassId);
            updateClassAbsentList('class1');
            updateClassAbsentList('class2');
            alert("Đã chuyển lớp!");
        }

        function copyAbsentList(classId) {
            navigator.clipboard.writeText(document.getElementById('absent-' + classId).innerText);
            alert("Đã copy!");
        }

        function saveData() {
            const data = {};
            document.querySelectorAll('.student-card').forEach(card => {
                data[card.id] = { parent: card.parentElement.id, isAbsent: card.classList.contains('is-absent'), note: card.querySelectorAll('select')[1].value };
            });
            localStorage.setItem('classData', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('classData');
            if (saved) {
                const data = JSON.parse(saved);
                for (let id in data) {
                    const card = document.getElementById(id);
                    if (card) {
                        document.getElementById(data[id].parent).appendChild(card);
                        if (data[id].isAbsent) card.classList.add('is-absent');
                        card.querySelectorAll('select')[1].value = data[id].note;
                    }
                }
            }
            updateClassAbsentList('class1');
            updateClassAbsentList('class2');
        }
    </script>
</body>
</html>
