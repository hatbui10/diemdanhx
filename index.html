<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Class Manager</title>
    <style>
        body { background: #0c0d0f; color: #d1d5db; font-family: 'Segoe UI', sans-serif; margin: 30px 3px 0 3px; }
        .main-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid #fbbf24; color: #fbbf24; padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        .section { display: none; margin-left: 15px; border-left: 1px solid #334155; padding-left: 15px; }
        .active { display: block; }
        
        .time-btn { background: #1e293b; color: #fff; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; border: 1px solid #475569; }
        .class-btn { background: #0f172a; border: 1px solid #334155; color: #94a3b8; padding: 12px; margin: 5px 0; border-radius: 6px; cursor: pointer; }
        
        .student-card { background: rgba(255,255,255,0.03); border: 1px solid #334155; padding: 10px; margin: 8px 0; border-radius: 8px; transition: 0.3s; }
        .is-absent { border: 1px solid #dc2626; background: rgba(220, 38, 38, 0.1); }
        
        .btn-group { display: flex; gap: 5px; margin-top: 8px; }
        button { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-yes { background: #059669; color: white; }
        .btn-no { background: #dc2626; color: white; }
        .btn-call { background: #2563eb; color: white; text-decoration: none; display: inline-block; padding: 6px 12px; }
        
        select { width: 100%; margin-top: 8px; padding: 5px; background: #000; color: #fbbf24; border: 1px solid #475569; border-radius: 4px; cursor: pointer; }
        .class-absent-list { margin-top: 10px; padding: 10px; border: 1px dashed #dc2626; color: #f87171; border-radius: 5px; font-size: 0.85em; font-weight: bold; }
        .btn-copy { background: #6366f1; color: white; margin-top: 8px; width: 100%; padding: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="main-btn" onclick="toggle('day2')">► THỨ 2</div>
    
    <div id="day2" class="section">
        <div class="time-btn" onclick="toggle('t18')">18:00 — PHIÊN HỌC</div>
        <div id="t18" class="section">
            <div class="class-btn" onclick="toggle('listA1')">LỚP A1 ▼</div>
            <div id="listA1" class="section" data-class="A1">
                
                <div class="student-card" id="st1">
                    <div>1. Nguyễn Văn A</div>
                    <div class="btn-group">
                        <button class="btn-yes" onclick="setAttendance('st1', false, 'A1')">Có mặt</button>
                        <button class="btn-no" onclick="setAttendance('st1', true, 'A1')">Vắng</button>
                        <a href="tel:0901234567" class="btn-call">📞 Gọi</a>
                    </div>
                    <select onchange="updateClassAbsentList('A1')">
                        <option value="">-- Ghi chú --</option>
                        <option value="Nghỉ phép">Nghỉ phép</option>
                        <option value="Đi muộn">Đi muộn</option>
                        <option value="Quên sách">Quên sách</option>
                    </select>
                </div>

                <div class="class-absent-list" id="absent-A1">Danh sách vắng: Không có</div>
                <button class="btn-copy" onclick="copyAbsentList('A1')">📋 Copy danh sách vắng</button>
            </div>
        </div>
    </div>

    <script>
        function toggle(id) {
            const el = document.getElementById(id);
            el.classList.toggle('active');
            el.style.display = el.classList.contains('active') ? 'block' : 'none';
        }

        function setAttendance(sid, isAbsent, className) {
            const card = document.getElementById(sid);
            isAbsent ? card.classList.add('is-absent') : card.classList.remove('is-absent');
            updateClassAbsentList(className);
        }

        function updateClassAbsentList(className) {
            const container = document.getElementById('list' + className);
            const absents = Array.from(container.querySelectorAll('.is-absent')).map(card => {
                const name = card.querySelector('div').innerText.split('. ')[1];
                const note = card.querySelector('select').value;
                return name + (note ? " [" + note + "]" : "");
            });
            
            document.getElementById('absent-' + className).innerHTML = 
                "Danh sách vắng:<br>" + (absents.length ? absents.join('<br>') : "Không có");
        }

        function copyAbsentList(className) {
            const container = document.getElementById('list' + className);
            const absents = Array.from(container.querySelectorAll('.is-absent')).map(card => {
                const name = card.querySelector('div').innerText.split('. ')[1];
                const note = card.querySelector('select').value;
                return name + (note ? " [" + note + "]" : "");
            });

            if (absents.length === 0) {
                alert("Danh sách vắng trống!");
                return;
            }

            const textToCopy = "DANH SÁCH VẮNG LỚP " + className + ":\n" + absents.join('\n');
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Đã copy danh sách vắng!");
            });
        }
    </script>
</body>
</html>
