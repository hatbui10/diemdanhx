    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin-top: 30px; 
            margin-left: 3px; 
            margin-right: 3px; 
            color: #333;
        }
        .container { max-width: 500px; margin: auto; padding: 20px; background: red; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 25px; border: 1px solid #ddd; outline: none; transition: 0.3s; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #0056b3; }
        
        .info-box { margin-top: 20px; padding: 15px; border: 1px solid #eee; border-radius: 15px; cursor: pointer; background: #fafafa; }
        
        /* Tiêu đề dòng trên cùng */
        .box-header { border-bottom: 2px solid #007bff; padding-bottom: 5px; margin-bottom: 10px; }
        .box-title { font-weight: bold; font-size: 1.1em; color: #007bff; display: inline-block; }
        .box-stats { font-size: 0.9em; color: #666; margin-top: 4px; font-weight: 500; }
        
        /* Khu vực danh sách vắng ở trên */
        .absent-section { background: #fff5f5; border: 1px dashed #e53e3e; border-radius: 10px; padding: 10px; margin-bottom: 15px; }
        .absent-header-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .absent-section h4 { margin: 0; color: #e53e3e; font-size: 0.95em; }
        .btn-copy-absent { width: auto; padding: 4px 10px; margin: 0; font-size: 0.8em; border-radius: 6px; background: #e53e3e; color: white; font-weight: normal; }
        .btn-copy-absent:hover { background: #c53030; }
        
        /* Cấu trúc 2 DÒNG của danh sách vắng (Họ tên - Chữ lý do + Nút gọi) */
        .absent-item { display: flex; flex-direction: column; padding: 8px 5px; border-bottom: 1px dashed #fecaca; gap: 4px; }
        .absent-item:last-child { border-bottom: none; }
        
        /* Dòng 2 danh sách vắng */
        .absent-row2 { display: flex; justify-content: space-between; align-items: center; }
        .absent-reason { color: #c53030; font-size: 0.9em; font-style: italic; font-weight: 500; }
        .absent-row2 a { text-decoration: none; }
        .btn-goi-small { width: auto; padding: 5px 15px; margin: 0; font-size: 0.8em; border-radius: 8px; background: #28a745; text-align: center; }

        /* Cấu trúc từng hàng dọc cho học sinh danh sách chính */
        .student-item { display: flex; flex-direction: column; padding: 12px 5px; border-bottom: 1px solid #eee; gap: 8px; transition: background 0.2s; }
        
        /* Dòng 1: Họ tên chính */
        .student-info { font-weight: 600; font-size: 1.05em; color: #222; }
        .student-info small { font-weight: normal; color: #666; margin-left: 10px; }
        
        /* Dòng 2: Các nút bấm chính */
        .student-actions { display: flex; gap: 5px; }
        .btn-action { width: auto; flex: 1; padding: 8px; font-size: 0.85em; margin: 0; border-radius: 8px; }
        .btn-goi { background: #28a745; text-align: center; }
        .btn-goi:hover { background: #218838; }
        .student-actions a { flex: 1; text-decoration: none; }
        
        /* Dòng 3: Dropdown ghi chú chính */
        .student-note { width: 100%; padding: 6px 12px; margin: 0; border-radius: 8px; font-size: 0.9em; background-color: #fff; }
        
        /* Trạng thái vắng của học sinh trong danh sách chính */
        .student-item.absent { background-color: #ffe6e6; border-radius: 10px; }
        
        /* Nút xóa hộp lớp học */
        .btn-delete-box { background: #dc3545; padding: 5px 10px; font-size: 0.8em; width: auto; border-radius: 5px; display: inline-block; float: right; margin-top: -2px;}
        .btn-delete-box:hover { background: #bd2130; }
    </style>
</head>

        const phong = document.getElementById('phongHoc').value;
        
        const boxId = 'box_' + Date.now(); 
        
        danhSachVangData[boxId] = { _lopKey: lopKey }; 
        danhSachHopList.push({ boxId, title: `${ca} - ${lopText} - ${phong}`, lopKey });
        
        luuVaoLocalStorage();
        dungGiaoDienHop(boxId, `${ca} - ${lopText} - ${phong}`, lopKey);
    }

    function dungGiaoDienHop(boxId, boxTitle, lopKey) {
        const container = document.getElementById('danhSachHop');
        const danhSachHocSinhCuaLop = dataHocSinh[lopKey] || [];

        const div = document.createElement('div');
        div.className = 'info-box';
        div.id = boxId;
        
        div.innerHTML = `
            <div class="box-header">
                <button class="btn-delete-box" onclick="xoaHopLop(event, '${boxId}')">Xóa</button>
                <div class="box-title">${boxTitle}</div>
                <div class="box-stats">Sĩ số: <span class="present-count">0</span>/${danhSachHocSinhCuaLop.length}</div>
            </div>
            <div class="list" style="display:none;">
                <div class="absent-section" style="display: none;">
                    <div class="absent-header-wrapper">
                        <h4>DANH SÁCH VẮNG (<span class="absent-count">0</span>)</h4>
                        <button class="btn-copy-absent" onclick="copyDanhSachVang(event, '${boxId}', '${boxTitle}')">Copy nhanh</button>
                    </div>
                    <div class="absent-list"></div>
                </div>
                <div class="main-student-list"></div>
            </div>
        `;
        
        div.onclick = function(e) { 
            if(e.target === this || e.target.className === 'box-header' || e.target.className === 'box-title' || e.target.className === 'box-stats' || e.target.className === 'absent-header-wrapper') {
                const list = this.querySelector('.list');
                list.style.display = list.style.display === 'none' ? 'block' : 'none';
            }
        };

        const mainListDiv = div.querySelector('.main-student-list');
        
        danhSachHocSinhCuaLop.forEach(hs => {
            const item = document.createElement('div');
            item.className = 'student-item';
            item.setAttribute('data-id', hs.id);
            
            const đangVang = danhSachVangData[boxId] && danhSachVangData[boxId][hs.id] !== undefined;
            if (đangVang) item.classList.add('absent');

            let selectOptions = '';
            const ghiChuHienTai = đangVang ? danhSachVangData[boxId][hs.id] : "";

            for (let key in ghiChuOptions) {
                const textHienThi = key === "" ? "-- Chọn ghi chú vắng --" : ghiChuOptions[key];
                const selected = key === ghiChuHienTai ? 'selected' : '';
                selectOptions += `<option value="${key}" ${selected}>${textHienThi}</option>`;
            }

            item.innerHTML = `
                <div class="student-info">${hs.ten} <small>(${hs.sdt})</small></div>
                
                <div class="student-actions">
                    <button class="btn-action" onclick="event.stopPropagation(); bieuDienVang('${boxId}', '${hs.id}', true)">Vắng</button>
                    <button class="btn-action" onclick="event.stopPropagation(); bieuDienVang('${boxId}', '${hs.id}', false)">Đi học</button>
                    <a href="tel:${hs.sdt}" onclick="event.stopPropagation();"><button class="btn-action btn-goi">Gọi</button></a>
                </div>

                <select class="student-note" onclick="event.stopPropagation();" onchange="capNhatGhiChu('${boxId}', '${hs.id}', this.value)">
                    ${selectOptions}
                </select>
            `;
            mainListDiv.appendChild(item);
        });
        
        container.appendChild(div);
        taiLaiDanhSachVangGiaoDien(boxId);
    }

    function bieuDienVang(boxId, studentId, isAbsent) {
        const box = document.getElementById(boxId);
        const studentRow = box.querySelector(`.student-item[data-id="${studentId}"]`);
        const noteSelect = studentRow.querySelector('.student-note');

        if (isAbsent) {
            studentRow.classList.add('absent');
            if (danhSachVangData[boxId][studentId] === undefined) {
                danhSachVangData[boxId][studentId] = noteSelect.value || "";
            }
        } else {
            studentRow.classList.remove('absent');
            delete danhSachVangData[boxId][studentId];
        }

        taiLaiDanhSachVangGiaoDien(boxId);
        luuVaoLocalStorage();
    }

    function capNhatGhiChu(boxId, studentId, value) {
        const box = document.getElementById(boxId);
        const studentRow = box.querySelector(`.student-item[data-id="${studentId}"]`);

        if (studentRow && studentRow.classList.contains('absent')) {
            danhSachVangData[boxId][studentId] = value;
            taiLaiDanhSachVangGiaoDien(boxId);
            luuVaoLocalStorage();
        }
    }

    function taiLaiDanhSachVangGiaoDien(boxId) {
        const box = document.getElementById(boxId);
        if(!box) return;
        const absentSection = box.querySelector('.absent-section');
        const absentListContainer = box.querySelector('.absent-list');
        const absentCountSpan = box.querySelector('.absent-count');
        const presentCountSpan = box.querySelector('.present-count');
        
        absentListContainer.innerHTML = ''; 
        
        const danhSachVangHienTai = danhSachVangData[boxId] || {};
        const lopKey = danhSachVangHienTai._lopKey;
        const listHocSinhCuaLop = dataHocSinh[lopKey] || [];
        
        const cacStudentIdVang = Object.keys(danhSachVangHienTai).filter(k => !k.startsWith('_'));
        
        // Cập nhật số lượng vắng lên nhãn danh sách vắng
        absentCountSpan.textContent = cacStudentIdVang.length;
        
        // Cập nhật sĩ số đi học thời gian thực lên dòng thống kê sĩ số
        presentCountSpan.textContent = listHocSinhCuaLop.length - cacStudentIdVang.length;

        if (cacStudentIdVang.length === 0) {
            absentSection.style.display = 'none';
            return;
        }

        absentSection.style.display = 'block';

        cacStudentIdVang.forEach(studentId => {
            const infoHs = listHocSinhCuaLop.find(h => h.id == studentId);
            if(!infoHs) return;
            
            const maGhiChu = danhSachVangHienTai[studentId];
            const textLyoDo = ghiChuOptions[maGhiChu] || "Chưa chọn lý do";

            const divVang = document.createElement('div');
            divVang.className = 'absent-item';
            divVang.innerHTML = `
                <div style="font-weight: 600; color: #c53030;">📌 ${infoHs.ten}</div>
                <div class="absent-row2">
                    <span class="absent-reason">Lý do: ${textLyoDo}</span>
                    <a href="tel:${infoHs.sdt}" onclick="event.stopPropagation();">
                        <button class="btn-goi-small">Gọi</button>
                    </a>
                </div>
            `;
            absentListContainer.appendChild(divVang);
        });
    }

    function copyDanhSachVang(event, boxId, boxTitle) {
        event.stopPropagation();
        const danhSachVangHienTai = danhSachVangData[boxId] || {};
        const lopKey = danhSachVangHienTai._lopKey;
        const listHocSinhCuaLop = dataHocSinh[lopKey] || [];
        const cacStudentIdVang = Object.keys(danhSachVangHienTai).filter(k => !k.startsWith('_'));

        if(cacStudentIdVang.length === 0) {
            alert("Không có học sinh vắng để copy!");
            return;
        }

        let textCopy = `Danh sách vắng:\n ${boxTitle}\n`;
        textCopy += `Vắng: ${cacStudentIdVang.length}\n`;
        textCopy += `---------------------------\n`;
        
        cacStudentIdVang.forEach((studentId, index) => {
            const infoHs = listHocSinhCuaLop.find(h => h.id == studentId);
            if(infoHs) {
                const maGhiChu = danhSachVangHienTai[studentId];
                const textLyoDo = ghiChuOptions[maGhiChu] || "Chưa chọn lý do";
                textCopy += `${index + 1}. ${infoHs.ten} \n Lý do: ${textLyoDo}\n`;
            }
        });

        navigator.clipboard.writeText(textCopy).then(() => {
            alert("Đã copy danh sách vắng thành công!");
        }).catch(err => {
            alert("Lỗi khi copy: ", err);
        });
    }

    function xoaHopLop(event, boxId) {
        event.stopPropagation();
        if(confirm("Bạn có chắc chắn muốn xóa lớp học này không?")) {
            document.getElementById(boxId).remove();
            delete danhSachVangData[boxId];
            danhSachHopList = danhSachHopList.filter(h => h.boxId !== boxId);
            luuVaoLocalStorage();
        }
    }

    function luuVaoLocalStorage() {
        localStorage.setItem('danhSachVangData', JSON.stringify(danhSachVangData));
        localStorage.setItem('danhSachHopList', JSON.stringify(danhSachHopList));
    }

    window.onload = function() {
        danhSachHopList.forEach(hop => {
            dungGiaoDienHop(hop.boxId, hop.title, hop.lopKey);
        });
    };
</script>
